site_name: "ray-ascend document"
site_description: "ray-ascend document — user guide and developer guide"
site_author: "ray-ascend"

docs_dir: .
site_dir: ../site

nav:
  - Home: index.md
  - User Guide:
      - Overview: user_guide/index.md
      - Installation: user_guide/installation.md
      - HCCL Collective Communication: user_guide/hccl_collective.md
      - YuanRong Direct Transport: user_guide/yr_transport.md
      - API Reference: user_guide/api_reference.md
      - Best Practices: user_guide/best_practices.md
  - Developer Guide:
      - Overview: developer_guide/index.md
      - Setup: developer_guide/setup.md
      - Contributing: developer_guide/contributing.md
theme:
  name: material
  language: en
  features:
    - navigation.instant
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - footnotes
  - pymdownx.superfences
plugins:
  - search
extra:
  repository_url: https://gitcode.com/Ascend/ray-ascend
