name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.1.0)'
        required: true
        type: string

jobs:
  build-package:
    runs-on: linux-aarch64-a3-2
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.2.rc1-a3-ubuntu22.04-py3.11
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Update version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Using manual version: ${{ inputs.version }}"
            python${{ matrix.python-version }} ci/update_version.py ${{ inputs.version }}
          else
            echo "Using tag version: ${GITHUB_REF#refs/tags/v}"
            python${{ matrix.python-version }} ci/update_version.py
          fi

      - name: Build package for Python ${{ matrix.python-version }}
        run: |
          echo "Building for Python ${{ matrix.python-version }}..."
          pip${{ matrix.python-version }} install --upgrade pip
          pip${{ matrix.python-version }} install build
          python${{ matrix.python-version }} -m build --wheel

      - name: Upload package artifacts
        uses: actions/upload-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-packages-${{ matrix.python-version }}
          path: dist/
          retention-days: 7

  publish-github-release:
    needs: build-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: python-packages-*
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: python-packages-*
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
